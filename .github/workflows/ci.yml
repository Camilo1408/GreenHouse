# GreenHouse Manager - Pipeline CI/CD
# Autores: [Nombres del equipo] | Fecha: 2026
# Actualizado: RBAC, Novedades, i18n completo

name: CI/CD GreenHouse Manager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # 1. Tests Backend (JUnit)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend - JUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas JUnit
        working-directory: greenhouse-backend
        run: mvn test -Dspring.profiles.active=test
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-report
          path: greenhouse-backend/target/surefire-reports/

  # ─────────────────────────────────────────
  # 2. Build Backend
  # ─────────────────────────────────────────
  backend-build:
    name: Backend - Build JAR
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        working-directory: greenhouse-backend
        run: mvn package -DskipTests
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Guardar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/*.jar

  # ─────────────────────────────────────────
  # 3. Frontend — TypeScript Check + Build
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend - TypeScript + Build React
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: greenhouse-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: greenhouse-frontend
        run: npm install

      - name: Verificación TypeScript (tsc --noEmit)
        working-directory: greenhouse-frontend
        run: npx tsc --noEmit

      - name: Build producción
        working-directory: greenhouse-frontend
        run: npm run build

      - name: Guardar build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: greenhouse-frontend/dist/

  # ─────────────────────────────────────────
  # 4. Tests API con Python
  # ─────────────────────────────────────────
  python-api-tests:
    name: API Tests - Python/pytest
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend en background
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test \
            --spring.mail.host=localhost \
            --spring.mail.port=25 \
            --spring.mail.username=test@test.com \
            --spring.mail.password=test \
            --spring.mail.properties.mail.smtp.auth=false \
            --spring.mail.properties.mail.smtp.starttls.enable=false &
          echo "Esperando que el backend inicie (health check)..."
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:8080/api/zonas > /dev/null 2>&1; then
              echo "Backend listo después de $((i*5))s"
              break
            fi
            echo "Intento $i/24 — backend aún no responde..."
          done
        env:
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        working-directory: tests-python
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas Python
        working-directory: tests-python
        run: pytest -v --html=report.html --self-contained-html

      - name: Publicar reporte Python
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-report
          path: tests-python/report.html

  # ─────────────────────────────────────────
  # 5. Tests Frontend con Selenium
  # ─────────────────────────────────────────
  selenium-tests:
    name: Frontend - Selenium UI Tests
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR backend
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test \
            --spring.mail.host=localhost \
            --spring.mail.port=25 \
            --spring.mail.username=test@test.com \
            --spring.mail.password=test \
            --spring.mail.properties.mail.smtp.auth=false \
            --spring.mail.properties.mail.smtp.starttls.enable=false &
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:8080/api/zonas > /dev/null 2>&1; then
              echo "Backend listo después de $((i*5))s"; break
            fi
            echo "Intento $i/24..."
          done
        env:
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

      - name: Descargar build frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: greenhouse-frontend/dist/

      - name: Configurar Node.js y arrancar frontend en preview
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Arrancar frontend en modo preview (serve)
        working-directory: greenhouse-frontend
        run: |
          npm install -g serve
          serve -s dist -l 5173 &
          sleep 5
          echo "Frontend disponible en http://localhost:5173"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Selenium
        working-directory: tests-selenium
        run: pip install -r requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Ejecutar tests Selenium — Auth y Dashboard
        working-directory: tests-selenium
        run: pytest test_auth.py test_dashboard.py -v --html=report-dashboard.html --self-contained-html
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: Ejecutar tests Selenium — Zonas, Plantas, Alertas
        working-directory: tests-selenium
        run: pytest test_zonas_ui.py test_plantas_ui.py test_alertas_ui.py -v --html=report-crud.html --self-contained-html
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: Ejecutar tests Selenium — Cosechas, Novedades, RBAC
        working-directory: tests-selenium
        run: pytest test_cosechas_ui.py test_novedades_ui.py test_rbac_ui.py -v --html=report-features.html --self-contained-html
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: Publicar reportes Selenium
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-reports
          path: |
            tests-selenium/report-dashboard.html
            tests-selenium/report-crud.html
            tests-selenium/report-features.html

  # ─────────────────────────────────────────
  # 6. Validación de Historias de Usuario con Taiga
  # ─────────────────────────────────────────
  taiga-validation:
    name: Taiga - Validación Historias de Usuario
    runs-on: ubuntu-latest
    needs: [python-api-tests]
    # Continúa aunque Taiga no esté configurado (variables opcionales)
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR backend
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test \
            --spring.mail.host=localhost \
            --spring.mail.port=25 \
            --spring.mail.username=test@test.com \
            --spring.mail.password=test \
            --spring.mail.properties.mail.smtp.auth=false \
            --spring.mail.properties.mail.smtp.starttls.enable=false &
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:8080/api/zonas > /dev/null 2>&1; then
              echo "Backend listo después de $((i*5))s"; break
            fi
            echo "Intento $i/24..."
          done
        env:
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        working-directory: tests-python
        run: pip install -r requirements.txt

      - name: Ejecutar validación de Taiga y criterios de aceptación
        working-directory: tests-python
        run: pytest test_taiga_integration.py -v --html=reporte-taiga.html --self-contained-html
        env:
          TAIGA_URL: ${{ secrets.TAIGA_URL }}
          TAIGA_USERNAME: ${{ secrets.TAIGA_USERNAME }}
          TAIGA_PASSWORD: ${{ secrets.TAIGA_PASSWORD }}
          TAIGA_PROJECT_SLUG: ${{ secrets.TAIGA_PROJECT_SLUG || 'cesar_camilo-greenhouse-manager' }}
          API_BASE_URL: http://localhost:8080

      - name: Publicar reporte Taiga
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taiga-validation-report
          path: tests-python/reporte-taiga.html
