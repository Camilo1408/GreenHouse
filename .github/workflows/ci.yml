# GreenHouse Manager - Pipeline CI/CD
# Autores: [Nombres del equipo] | Fecha: 2026

name: CI/CD GreenHouse Manager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # 1. Tests Backend (JUnit)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend - JUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas JUnit
        working-directory: greenhouse-backend
        run: mvn test -Dspring.profiles.active=test
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-report
          path: greenhouse-backend/target/surefire-reports/

  # ─────────────────────────────────────────
  # 2. Build Backend
  # ─────────────────────────────────────────
  backend-build:
    name: Backend - Build JAR
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        working-directory: greenhouse-backend
        run: mvn package -DskipTests
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Guardar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/*.jar

  # ─────────────────────────────────────────
  # 3. Tests API con Python
  # ─────────────────────────────────────────
  python-api-tests:
    name: API Tests - Python/pytest
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend en background
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test &
          echo "Esperando que el backend inicie..."
          sleep 30
        env:
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        working-directory: tests-python
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas Python
        working-directory: tests-python
        run: pytest -v --html=report.html --self-contained-html

      - name: Publicar reporte Python
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-report
          path: tests-python/report.html

  # ─────────────────────────────────────────
  # 4. Build Frontend
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend - Build React
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: greenhouse-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: greenhouse-frontend
        run: npm install

      - name: Build producción
        working-directory: greenhouse-frontend
        run: npm run build

      - name: Guardar build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: greenhouse-frontend/dist/

  # ─────────────────────────────────────────
  # 5. Tests Frontend con Selenium
  # ─────────────────────────────────────────
  selenium-tests:
    name: Frontend - Selenium UI Tests
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR backend
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test \
            --spring.mail.host=smtp.gmail.com \
            --spring.mail.username=noreply@test.com \
            --spring.mail.password=testpass &
          echo "Esperando backend..."
          sleep 35

      - name: Configurar Node.js y arrancar frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y arrancar frontend en preview
        working-directory: greenhouse-frontend
        run: |
          npm install
          npm run build
          npx serve -s dist -l 5173 &
          sleep 5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Selenium
        working-directory: tests-selenium
        run: pip install -r requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Ejecutar tests Selenium
        working-directory: tests-selenium
        run: pytest -v --html=reporte-selenium.html --self-contained-html
        env:
          DISPLAY: ':99'

      - name: Publicar reporte Selenium
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: tests-selenium/reporte-selenium.html

  # ─────────────────────────────────────────
  # 6. Validación de Historias de Usuario con Taiga
  # ─────────────────────────────────────────
  taiga-validation:
    name: Taiga - Validación Historias de Usuario
    runs-on: ubuntu-latest
    needs: [python-api-tests]
    # Continúa aunque Taiga no esté configurado (variables opcionales)
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: greenhouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar JAR backend
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: greenhouse-backend/target/

      - name: Arrancar backend
        working-directory: greenhouse-backend/target
        run: |
          java -jar *.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse_db \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.security.oauth2.client.registration.google.client-id=test \
            --spring.security.oauth2.client.registration.google.client-secret=test \
            --spring.mail.host=smtp.gmail.com \
            --spring.mail.username=noreply@test.com \
            --spring.mail.password=testpass &
          sleep 30

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        working-directory: tests-python
        run: pip install -r requirements.txt

      - name: Ejecutar validación de Taiga y criterios de aceptación
        working-directory: tests-python
        run: pytest test_taiga_integration.py -v --html=reporte-taiga.html --self-contained-html
        env:
          TAIGA_URL: ${{ secrets.TAIGA_URL }}
          TAIGA_USERNAME: ${{ secrets.TAIGA_USERNAME }}
          TAIGA_PASSWORD: ${{ secrets.TAIGA_PASSWORD }}
          TAIGA_PROJECT_SLUG: ${{ secrets.TAIGA_PROJECT_SLUG || 'cesar_camilo-greenhouse-manager' }}
          API_BASE_URL: http://localhost:8080

      - name: Publicar reporte Taiga
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taiga-validation-report
          path: tests-python/reporte-taiga.html
