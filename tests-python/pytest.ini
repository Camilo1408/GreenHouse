[pytest]
# GreenHouse Manager — Configuracion de pytest para pruebas de API
# Autores: [Nombres del equipo] | Fecha: 2026

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: pruebas criticas de humo (seleccion rapida)
    rbac: pruebas de control de acceso por roles
    integration: pruebas de integracion que requieren backend corriendo
