# GreenHouse Manager - Configuracion para pruebas (perfil: test)
# Autores: [Nombres del equipo] | Fecha: 2026
# Usa H2 en memoria para tests unitarios/integración sin necesidad de PostgreSQL

# ===== Base de datos H2 en memoria =====
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===== JPA / Hibernate (H2) =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ===== Deshabilitar validación de mail en tests =====
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ===== OAuth2 (valores fake para tests) =====
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# ===== Scheduling desactivado en tests =====
spring.task.scheduling.enabled=false
