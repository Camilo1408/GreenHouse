server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: redirige cualquier 404 a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Las llamadas a /api/ van directamente al backend vía VITE_API_URL
    # (axios usa la URL completa del backend, no el proxy de nginx)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
