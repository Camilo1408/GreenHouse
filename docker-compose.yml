# GreenHouse Manager - Entorno local con Docker Compose
# Autores: [Nombres del equipo] | Fecha: 2026
# Uso: docker compose up -d

services:

  # ─── Base de datos PostgreSQL ───
  postgres:
    image: postgres:15-alpine
    container_name: greenhouse-postgres
    environment:
      POSTGRES_DB: greenhouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ───
  backend:
    build:
      context: ./greenhouse-backend
      dockerfile: Dockerfile
    container_name: greenhouse-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/greenhouse_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend React ───
  frontend:
    build:
      context: ./greenhouse-frontend
      dockerfile: Dockerfile
    container_name: greenhouse-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
