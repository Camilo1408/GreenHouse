[pytest]
# GreenHouse Manager — Configuración de Pytest Selenium
# Autores: [Nombres del equipo] | Fecha: 2026

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reporte-selenium.html
    --self-contained-html
    -v
    --tb=short
log_cli = true
log_cli_level = INFO
